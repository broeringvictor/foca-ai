<nav
  aria-label="Navegação principal"
  [class]="iconOnly() ? 'flex flex-col items-center gap-1 px-2' : 'flex flex-col gap-0.5 p-3'"
>
  @for (item of items; track item.label) {

    @if (!iconOnly() && item.sectionLabel) {
      <p class="px-3 pt-4 pb-1 text-xs font-semibold tracking-widest text-surface-400 uppercase select-none">
        {{ item.sectionLabel }}
      </p>
    }

    @if (item.route) {
      <a
        [routerLink]="item.route"
        routerLinkActive
        #rla="routerLinkActive"
        [routerLinkActiveOptions]="{ exact: true }"
        (click)="onLeafClick()"
        [pTooltip]="iconOnly() ? item.label : ''"
        tooltipPosition="right"
        [class]="linkClass(rla.isActive)"
      >
        @if (iconOnly()) {
          <i
            [class]="item.icon ?? ''"
            class="text-2xl transition-colors"
            [class.text-primary]="rla.isActive"
            [class.text-slate-500]="!rla.isActive"
            [class.dark:text-slate-400]="!rla.isActive"
          ></i>
        } @else {
          @if (item.icon) {
            <i [class]="item.icon" class="text-xl"></i>
          }
          <span class="text-sm font-medium">{{ item.label }}</span>
        }
      </a>
    }
  }
</nav>
