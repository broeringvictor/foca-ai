services:
  api:
    build: .
    depends_on:
      - db
    ports:
      - "8000:8000"
    environment:
      POSTGRES_HOST: db
      POSTGRES_PORT: 5432
      POSTGRES_DB: foca-ai
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: changeme
  db:
    image: postgres:18
    restart: unless-stopped
    environment:
      POSTGRES_DB: foca-ai
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: changeme
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql

volumes:
  pgdata:
